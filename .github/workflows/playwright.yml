name: Playwright QA

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - generate-storage-state
  push:
    branches: [main]
  pull_request:

jobs:
  generate-storage-state:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate-storage-state')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps

      - name: Generar storageState.json (login UI Google)
        run: node scripts/generateStorageState.js
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CI: true
          PLAYWRIGHT_SKIP_GOOGLE_UI: 0
          STORAGE_STATE_OUTPUT: storageState.json

      - name: Generar PLAYWRIGHT_STORAGE_B64.txt
        run: |
          test -s storageState.json
          cat storageState.json | base64 -w0 > PLAYWRIGHT_STORAGE_B64.txt
          test -s PLAYWRIGHT_STORAGE_B64.txt

      - name: Subir artifact con storage state
        uses: actions/upload-artifact@v4
        with:
          name: playwright-storage-state
          path: |
            storageState.json
            PLAYWRIGHT_STORAGE_B64.txt

  test:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'generate-storage-state'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm ci exige package-lock.json; en equipos sin npm local se versiona solo package.json.
      # Cuando exista lockfile en el repo, puede cambiarse a npm ci para instalación reproducible.
      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps

      # Sesión ya logueada (recomendado en CI): generar el JSON en una máquina con Playwright y:
      #   base64 -w0 playwright/.auth/p2l-admin.json   (Linux / Git Bash)
      # Subir el resultado como secreto PLAYWRIGHT_STORAGE_B64 en el repo.
      - name: Restaurar sesión Playwright (opcional)
        env:
          STORAGE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_B64 }}
        run: |
          if [ -z "$STORAGE_B64" ]; then
            echo "Sin PLAYWRIGHT_STORAGE_B64: se intentará login por UI (a menudo falla en Actions por Google)."
            exit 0
          fi
          mkdir -p playwright/.auth
          echo "$STORAGE_B64" | base64 -d > playwright/.auth/ci-state.json
          test -s playwright/.auth/ci-state.json
          echo "PLAYWRIGHT_STORAGE_STATE=playwright/.auth/ci-state.json" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_SKIP_GOOGLE_UI=1" >> "$GITHUB_ENV"

      # PLAYWRIGHT_STORAGE_STATE / PLAYWRIGHT_SKIP_GOOGLE_UI llegan del paso anterior vía GITHUB_ENV.
      - name: Ejecutar Playwright
        run: npx playwright test
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
