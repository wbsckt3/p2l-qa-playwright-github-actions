name: Playwright QA

name: Playwright QA Pro

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - generate-storage-state

  push:
    branches: [main]

  pull_request:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==========================================================
  # GENERAR STORAGE STATE (MANUAL ONLY)
  # ==========================================================
  generate-storage-state:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'generate-storage-state'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Generate storageState.json
        run: node scripts/generateStorageState.js
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          STORAGE_STATE_OUTPUT: storageState.json
          CI: true

      - name: Encode Base64
        run: |
          test -s storageState.json
          base64 -w0 storageState.json > PLAYWRIGHT_STORAGE_B64.txt
          test -s PLAYWRIGHT_STORAGE_B64.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-storage-state
          path: |
            storageState.json
            PLAYWRIGHT_STORAGE_B64.txt


  # ==========================================================
  # TESTS
  # ==========================================================
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'test')

    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # ==========================================
      # RESTORE AUTH SESSION
      # ==========================================
      - name: Restore storage state
        env:
          STORAGE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_B64 }}
        run: |
          mkdir -p playwright/.auth

          if [ -n "$STORAGE_B64" ]; then
            echo "$STORAGE_B64" | base64 -d > playwright/.auth/ci-state.json
            test -s playwright/.auth/ci-state.json
            echo "PLAYWRIGHT_STORAGE_STATE=playwright/.auth/ci-state.json" >> $GITHUB_ENV
            echo "PLAYWRIGHT_SKIP_GOOGLE_UI=1" >> $GITHUB_ENV
            echo "Storage restored OK"
          else
            echo "No PLAYWRIGHT_STORAGE_B64 found"
          fi

      # ==========================================
      # RUN TESTS
      # ==========================================
      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CI: true

      # ==========================================
      # REPORTS
      # ==========================================
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/

      - name: Upload Results / Videos / Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/

      # ==========================================
      # OPTIONAL FAILURE SUMMARY
      # ==========================================
      - name: Failure summary
        if: failure()
        run: |
          echo "Playwright tests failed on browser: ${{ matrix.browser }}"