name: Playwright QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps chrome

      # En CI no se ejecuta login Google en el workflow: se rehidrata sesión desde el secreto (generada fuera del job).
      - name: Sesion Playwright desde secreto (opcional)
        env:
          STORAGE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_B64 }}
        run: |
          if [ -z "$STORAGE_B64" ]; then
            echo "Sin PLAYWRIGHT_STORAGE_B64: el E2E de dashboard se omitira (no hay login en CI)."
            exit 0
          fi
          mkdir -p playwright/.auth
          printf '%s' "$STORAGE_B64" | base64 -d > playwright/.auth/ci-state.json
          test -s playwright/.auth/ci-state.json
          echo "PLAYWRIGHT_STORAGE_STATE=playwright/.auth/ci-state.json" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_SKIP_GOOGLE_UI=1" >> "$GITHUB_ENV"

      - name: Ejecutar Playwright
        run: npx playwright test
        env:
          CI: 'true'
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # upload-artifact puede excluir rutas en .gitignore; copiamos a una carpeta no ignorada.
      - name: Empaquetar reporte HTML y test-results
        if: always()
        run: |
          rm -rf ci-upload
          mkdir -p ci-upload
          if [ -d playwright-report ] && [ -f playwright-report/index.html ]; then
            cp -R playwright-report ci-upload/
            echo "playwright-report -> ci-upload/ (incl. index.html)"
          else
            echo "::warning::No se generó playwright-report/index.html; el reporter HTML debería crearse al terminar los tests."
            ls -la . || true
            ls -la playwright-report 2>/dev/null || true
          fi
          if [ -d test-results ]; then
            cp -R test-results ci-upload/test-results
            echo "test-results -> ci-upload/test-results"
          fi
          echo "--- ci-upload ---" && find ci-upload -type f 2>/dev/null | head -200 || true

      - name: Subir reporte (HTML + capturas, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-outputs
          if-no-files-found: warn
          path: ci-upload
