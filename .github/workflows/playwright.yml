name: Playwright QA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps

      - name: Restaurar sesion Playwright (opcional)
        env:
          STORAGE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_B64 }}
        run: |
          if [ -z "$STORAGE_B64" ]; then
            echo "Sin PLAYWRIGHT_STORAGE_B64: el spec principal se omitira en CI."
            exit 0
          fi
          mkdir -p playwright/.auth
          echo "$STORAGE_B64" | base64 -d > playwright/.auth/ci-state.json
          test -s playwright/.auth/ci-state.json
          echo "PLAYWRIGHT_STORAGE_STATE=playwright/.auth/ci-state.json" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_SKIP_GOOGLE_UI=1" >> "$GITHUB_ENV"

      - name: Ejecutar Playwright
        run: npx playwright test
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
