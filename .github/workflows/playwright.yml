name: Playwright QA

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm ci exige package-lock.json; en equipos sin npm local se versiona solo package.json.
      # Cuando exista lockfile en el repo, puede cambiarse a npm ci para instalación reproducible.
      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps

      - run: npx playwright test
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
